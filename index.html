<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadrante dos Cavaleiros - Quarta Asa</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #d4af37; /* Tom dourado */
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        p {
            font-style: italic;
            color: #a0a0a0;
        }
        .banner {
            max-width: 100%;
            height: auto;
            max-height: 400px;
            border-radius: 5px;
            border: 2px solid #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            margin-bottom: 30px;
        }
        .btn-link {
            display: inline-block;
            background-color: #d4af37;
            color: #121212;
            padding: 14px 28px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        .btn-link:hover {
            background-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <h1>Bem-vindo à Escola Militar Basgiath</h1>
    <p>"Um dragão sem seu cavaleiro é uma tragédia. Um cavaleiro sem seu dragão é um cadáver."</p>

    <img class="banner" src="aqui-tem-diversao-quarta-asa-2.webp" alt="Chamas e fumaça escura">

    <br><br>

    <a class="btn-link" href="https://www.rebeccayarros.com" target="_blank">Entrar no Quadrante de Ataque</a>

</body>
</html>
